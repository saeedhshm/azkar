name: azkar
description: "Adhkar App - Daily remembrance and duas."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  go_router: ^16.2.0
  flutter_local_notifications: ^19.4.2
  google_fonts: ^6.3.2
  get_it: ^8.2.0
  share_plus: ^12.0.0
  timezone: ^0.10.1
  easy_localization: ^3.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/adhkar_1500.json
    - assets/translations/
